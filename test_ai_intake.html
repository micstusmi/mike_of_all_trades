<!DOCTYPE html>
<html>
<head>
    <title>AI Intake Test</title>
    <style>
        body{font-family:Arial;background:#111;color:white;padding:40px}
        .card{background:#1f1f1f;padding:20px;border-radius:12px;max-width:800px}
        input, textarea{width:100%;padding:12px;border-radius:8px;border:none;margin-bottom:12px}
        textarea{min-height:90px}
        button{padding:10px 16px;border:none;border-radius:8px;cursor:pointer;margin:5px}
        .primary{background:#ffc107;color:black;font-weight:bold}
        .option-btn{background:#333;color:white}
        .danger{background:#0dcaf0;color:#000;font-weight:bold}
        .frustrated{background:#dc3545;color:#fff;font-weight:bold}
        #responseBox,#correctionBox,#contactBox{margin-top:25px;padding:20px;background:#222;border-radius:12px;display:none}
        .assumption{color:#bbb;font-size:14px;margin:4px 0}
        .chat-line{border-bottom:1px solid #333;padding:8px 0}
        .hint{color:#aaa;font-size:14px}
    </style>
</head>
<body>

<div class="card">
    <h2>AI Job Intake</h2>

    <form id="aiForm">
        <label>What do you need done?</label>
        <input name="job" id="jobInput" placeholder="Example: paint some window frames" required>
        <button class="primary">Continue</button>
    </form>

    <div id="responseBox">
        <p id="replyText"></p>
        <div id="assumptionsBox"></div>
        <div id="optionsBox"></div>
    </div>

    <div id="correctionBox">
        <h3>Correct or guide the AI</h3>
        <p class="hint">
            Use this if the AI misunderstood you, asked the wrong question, or you want to steer the conversation.
        </p>

        <textarea
            id="correctionInput"
            placeholder="Example: No, I don’t want advice. I just want to book Mike for this job."
        ></textarea>

        <button class="primary" type="button" onclick="sendCorrectionToAI()">
            Send feedback to AI
        </button>
    </div>

    <div style="margin-top:20px;">
        <button class="frustrated" type="button" onclick="showContactMikeBox()">
            AI not helping? Send this chat to Mike
        </button>
    </div>

    <div id="contactBox">
        <h3>Ask Mike to step in</h3>
        <p>If the AI has not quite understood, send this conversation to Mike.</p>

        <input id="customerName" placeholder="Your name">
        <input id="customerEmail" placeholder="Your email">
        <input id="customerPhone" placeholder="Your phone">

        <button class="danger" type="button" onclick="sendChatToMike()">
            Send conversation to Mike
        </button>

        <p id="sendStatus"></p>
    </div>

    <div id="chatHistoryBox" style="margin-top:25px;"></div>
</div>

<script>
let chatHistory = [];

document.getElementById('aiForm').addEventListener('submit', async function(e){
    e.preventDefault();

    const jobText = document.getElementById('jobInput').value.trim();

    if(!jobText){
        return;
    }

    await sendMessageToAI(jobText, 'Customer');

    document.getElementById('jobInput').value = '';
});

async function sendCorrectionToAI(){
    const correctionText = document.getElementById('correctionInput').value.trim();

    if(!correctionText){
        alert('Please type your correction or feedback first.');
        return;
    }

    await sendMessageToAI(correctionText, 'Customer correction');

    document.getElementById('correctionInput').value = '';
}

async function sendMessageToAI(message, roleLabel){

    chatHistory.push({
        role: roleLabel,
        message: message
    });

    const fd = new FormData();
    fd.append('job', message);
    fd.append('history', formatChatHistory());

    const r = await fetch('ai_intake.php', {
        method:'POST',
        body:fd
    });

    const data = await r.json();

    if(!data.success){
        alert(data.message || 'AI request failed.');
console.log(data);
        return;
    }

    let parsed;

    try{
        parsed = JSON.parse(data.raw);
    }catch(err){
        alert('AI response parse failed');
        console.log(data.raw);
        return;
    }

    chatHistory.push({
        role: 'AI',
        message: parsed.reply || ''
    });

    renderAiResponse(parsed);
    renderChatHistory();
}

function renderAiResponse(parsed){
    document.getElementById('responseBox').style.display = 'block';
    document.getElementById('correctionBox').style.display = 'block';

    document.getElementById('replyText').innerText = parsed.reply || 'No reply';

    const assumptionsBox = document.getElementById('assumptionsBox');
    assumptionsBox.innerHTML = '';

    if(parsed.assumptions && parsed.assumptions.length){
        const title = document.createElement('strong');
        title.innerText = 'Current assumptions:';
        assumptionsBox.appendChild(title);

        parsed.assumptions.forEach(item => {
            const p = document.createElement('div');
            p.className = 'assumption';
            p.innerText = '• ' + item;
            assumptionsBox.appendChild(p);
        });
    }

    const optionsBox = document.getElementById('optionsBox');
    optionsBox.innerHTML = '';

    let options = parsed.next_step_options || [];

    const fallbackOptions = [
        'Add more information',
        'Get a quote',
        'Make a booking',
        "Check Mike's availability",
        'Get advice',
        'Find out how long it may take',
        'Ask Mike to contact me'
    ];

    fallbackOptions.forEach(option => {
        if(!options.includes(option)){
            options.push(option);
        }
    });

    optionsBox.innerHTML = '';

const heading = document.createElement('h3');
heading.innerText = 'What would you like to do next?';
optionsBox.appendChild(heading);

options.forEach(option => {

    const btn = document.createElement('button');

    btn.className = 'option-btn';

    if(option === 'Make a booking'){
        btn.style.background = '#198754';
    }

    if(option === 'Ask Mike to contact me'){
        btn.style.background = '#dc3545';
    }

    btn.innerText = option;
    'raw' => $content
    btn.type = 'button';

    btn.onclick = () => handleNextStep(option, parsed);

    optionsBox.appendChild(btn);
});

function handleNextStep(option, aiData){

    chatHistory.push({
        role: 'Customer selected',
        message: option
    });

    if(option === 'Add more information'){
        document.getElementById('correctionBox').style.display = 'block';
        document.getElementById('correctionInput').placeholder =
            'Add more information about the job here...';
        document.getElementById('correctionInput').focus();
        renderChatHistory();
        return;
    }

    if(option === 'Ask Mike to contact me'){
        showContactMikeBox();
        renderChatHistory();
        return;
    }

    if(option === 'I need to correct something' || option === 'I already have materials'){
        document.getElementById('correctionBox').style.display = 'block';
        document.getElementById('correctionInput').placeholder =
            'Tell me what needs correcting or what materials you already have...';
        document.getElementById('correctionInput').focus();
        renderChatHistory();
        return;
    }

    if(option === 'Book a half day'){
        sessionStorage.setItem('aiBookingPreset', JSON.stringify({
            mode: 'hours',
            duration: 4,
            description: aiData.understood_job || ''
        }));

        window.location.href = 'quotes_bookings.php?ai_intake=1&preset=half_day';
        return;
    }

    if(option === 'Book a full day'){
        sessionStorage.setItem('aiBookingPreset', JSON.stringify({
            mode: 'days',
            duration: 1,
            description: aiData.understood_job || ''
        }));

        window.location.href = 'quotes_bookings.php?ai_intake=1&preset=full_day';
        return;
    }

    if(option === 'Upcoming day'){
        window.location.href = 'quotes_bookings.php?ai_intake=1&step=availability&view=day';
        return;
    }

    if(option === 'Upcoming week' || option === "Check Mike's availability"){
        window.location.href = 'quotes_bookings.php?ai_intake=1&step=availability&view=week';
        return;
    }

    if(option === 'Upcoming month'){
        window.location.href = 'quotes_bookings.php?ai_intake=1&step=availability&view=month';
        return;
    }

    if(option === 'Get a quote' || option === 'Make a booking' || option === 'Looks right'){
        const savedData = {
            original_job: formatChatHistory(),
            understood_job: aiData.understood_job || '',
            selected_option: option
        };

        sessionStorage.setItem('aiJobIntake', JSON.stringify(savedData));

        window.location.href = 'quotes_bookings.php?ai_intake=1';
        return;
    }

    if(option === 'Get advice' || option === 'Find out how long it may take'){
        document.getElementById('correctionBox').style.display = 'block';
        document.getElementById('correctionInput').placeholder =
            'Add any extra details first, or press Send feedback to AI to continue...';
        document.getElementById('correctionInput').focus();
        renderChatHistory();
        return;
    }

    renderChatHistory();
}

function showContactMikeBox(){
    document.getElementById('contactBox').style.display = 'block';
    document.getElementById('customerName').focus();
}

function sendChatToMike(){
    const fd = new FormData();

    fd.append('name', document.getElementById('customerName').value);
    fd.append('email', document.getElementById('customerEmail').value);
    fd.append('phone', document.getElementById('customerPhone').value);
    fd.append('chat', formatChatHistory());

    fetch('ai_send_to_mike.php', {
        method:'POST',
        body:fd
    })
    .then(r => r.json())
    .then(res => {
        document.getElementById('sendStatus').innerText =
            res.message || 'Sent.';
    });
}

function formatChatHistory(){
    return chatHistory.map(item => item.role + ': ' + item.message).join("\n\n");
}

function renderChatHistory(){
    const box = document.getElementById('chatHistoryBox');
    box.innerHTML = '<h3>Conversation so far</h3>';

    chatHistory.forEach(item => {
        const div = document.createElement('div');
        div.className = 'chat-line';
        div.innerHTML =
            '<strong>' + item.role + ':</strong><br>' +
            item.message.replace(/\n/g, '<br>');
        box.appendChild(div);
    });
}
</script>

</body>
</html>
