<!DOCTYPE html>
<html>
<head>
    <title>AI Intake Test</title>
    <style>
        body{font-family:Arial;background:#111;color:white;padding:30px}
        .card{background:#1f1f1f;padding:20px;border-radius:14px;max-width:780px;margin:auto}
        textarea,input{width:100%;padding:14px;border-radius:10px;border:none;margin-bottom:12px;box-sizing:border-box}
        textarea{min-height:95px}
        button{padding:11px 16px;border:none;border-radius:999px;cursor:pointer;margin:5px;font-weight:bold}
        .primary{background:#ffc107;color:#000}
        .quote{background:#f39200;color:#fff}
        .booking{background:#198754;color:#fff}
        .availability{background:#0d6efd;color:#fff}
        .advice{background:#6f42c1;color:#fff}
        .mike{background:#dc3545;color:#fff}
        .correct{background:#444;color:#fff}
        #responseBox,#contactBox{margin-top:20px;padding:18px;background:#222;border-radius:12px;display:none}
        #actionButtons{margin-top:18px;display:flex;flex-wrap:wrap;gap:8px}
        .chat-line{border-bottom:1px solid #333;padding:8px 0}
        .hint{color:#aaa;font-size:14px}
    </style>
</head>

<body>

<div class="card">
    <h2>Tell us what you want</h2>
    <p class="hint">
        Type what you need done, or continue replying to the assistant here.
    </p>

    <form id="aiForm">
        <textarea
            id="messageInput"
            placeholder="Example: paint some window frames"
            required
        ></textarea>

        <button class="primary" type="submit">
            Send
        </button>
    </form>

    <div id="responseBox">
        <p id="replyText"></p>

        <div id="actionButtons">
            <button class="quote" type="button" onclick="goQuote()">Get quote</button>
            <button class="booking" type="button" onclick="goBooking()">Make booking</button>
            <button class="availability" type="button" onclick="goAvailability()">See availability</button>
            <button class="mike" type="button" onclick="showContactMikeBox()">Send this chat to Mike</button>
            <button class="correct" type="button" onclick="focusCorrection()">Correct / redirect AI</button>
        </div>
    </div>

    <div id="contactBox">
        <h3>Send this chat to Mike</h3>
        <p class="hint">Mike can review the conversation and contact you offline.</p>

        <input id="customerName" placeholder="Your name">
        <input id="customerEmail" placeholder="Your email">
        <input id="customerPhone" placeholder="Your phone">

        <button class="mike" type="button" onclick="sendChatToMike()">
            Send conversation to Mike
        </button>

        <p id="sendStatus"></p>
    </div>

    <div id="chatHistoryBox" style="margin-top:25px;"></div>
</div>

<script>
let chatHistory = [];
let lastAiData = {};

document.getElementById('aiForm').addEventListener('submit', async function(e){
    e.preventDefault();

    const message = document.getElementById('messageInput').value.trim();

    if(!message){
        return;
    }

    await sendMessageToAI(message, 'Customer');

    document.getElementById('messageInput').value = '';
    document.getElementById('messageInput').placeholder =
        'Continue typing or responding to this chat...';
});

async function sendMessageToAI(message, roleLabel){
    chatHistory.push({
        role: roleLabel,
        message: message
    });

    renderChatHistory();

    const fd = new FormData();
    fd.append('job', message);
    fd.append('history', formatChatHistory());

    let data;

    try{
        const r = await fetch('ai_intake.php', {
            method:'POST',
            body:fd
        });

        data = await r.json();
    }catch(err){
        alert('Could not contact AI endpoint: ' + err.message);
        return;
    }

    if(!data.success){
        alert(data.message || 'AI request failed.');
        console.log(data);
        return;
    }

    let parsed;

    try{
        parsed = JSON.parse(data.raw);
    }catch(err){
        alert('AI response could not be parsed. Check console.');
        console.log(data.raw);
        return;
    }

    lastAiData = parsed;

    chatHistory.push({
        role: 'AI',
        message: parsed.reply || 'No reply returned.'
    });

    document.getElementById('responseBox').style.display = 'block';
    document.getElementById('replyText').innerText =
        parsed.reply || 'No reply returned.';

    renderChatHistory();
}

function goQuote(){
    saveAiIntake('Get a quote');
    window.location.href = 'quotes_bookings.php?ai_intake=1';
}

function goBooking(){
    saveAiIntake('Make a booking');
    window.location.href = 'quotes_bookings.php?ai_intake=1';
}

function goAvailability(){
    saveAiIntake('See availability');
    window.location.href = 'quotes_bookings.php?ai_intake=1&step=availability&view=week';
}

function focusCorrection(){
    document.getElementById('messageInput').placeholder =
        'Tell us what the AI got wrong, or what direction you want to go instead...';
    document.getElementById('messageInput').focus();
}

function showContactMikeBox(){
    document.getElementById('contactBox').style.display = 'block';
    document.getElementById('customerName').focus();
}

function saveAiIntake(option){
    const savedData = {
        original_job: formatChatHistory(),
        understood_job: lastAiData.understood_job || '',
        selected_option: option
    };

    sessionStorage.setItem('aiJobIntake', JSON.stringify(savedData));
}

function sendChatToMike(){
    const fd = new FormData();

    fd.append('name', document.getElementById('customerName').value);
    fd.append('email', document.getElementById('customerEmail').value);
    fd.append('phone', document.getElementById('customerPhone').value);
    fd.append('chat', formatChatHistory());

    fetch('ai_send_to_mike.php', {
        method:'POST',
        body:fd
    })
    .then(r => r.json())
    .then(res => {
        document.getElementById('sendStatus').innerText =
            res.message || 'Sent to Mike.';
    });
}

function formatChatHistory(){
    return chatHistory.map(item => item.role + ': ' + item.message).join("\n\n");
}

function renderChatHistory(){
    const box = document.getElementById('chatHistoryBox');
    box.innerHTML = '<h3>Conversation so far</h3>';

    chatHistory.forEach(item => {
        const div = document.createElement('div');
        div.className = 'chat-line';
        div.innerHTML =
            '<strong>' + item.role + ':</strong><br>' +
            item.message.replace(/\n/g, '<br>');
        box.appendChild(div);
    });
}
</script>

</body>
</html>
